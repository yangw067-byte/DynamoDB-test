name: Terraform Destroy

on:
    workflow_dispatch:
        inputs:
            terraform_state_bucket:
                description: "S3 bucket name for Terraform state"
                required: true
                default: "yangw067test"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    id-token: write # Allows requesting an OIDC token
    contents: read # Required for actions/checkout

env:
    # Default AWS region; update as needed for your deployment
    AWS_REGION: us-east-1
    TerraformStateBucket: ${{ github.event.inputs.terraform_state_bucket }} # S3 bucket name for Terraform state
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    terraform-destroy:
        runs-on: ubuntu-latest
        steps:
            - name: Validate required secrets
              run: |
                  if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
                    echo "Error: AWS_ROLE_ARN secret is not set. Please add it in your repository settings."
                    exit 1
                  fi

            - name: Configure AWS credentials via OIDC
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  # Set the AWS region; change if deploying to a different region
                  aws-region: ${{ env.AWS_REGION }}

            - name: Verify IAM Role Assumption
              run: aws sts get-caller-identity

            - name: Initialize Terraform
              run: terraform init -input=false

            - name: Terraform Plan
              working-directory: ${{ github.workspace }}
              run: |
                  terraform plan -input=false -var-file=terraform.tfvars -out=tf.plan

            - name: Check if terraform state file exists in S3
              id: check_s3
              run: |
                  if aws s3api head-object --bucket ${{ env.TerraformStateBucket }} --key ${{ github.repository_id }}/terraform.tfstate > /dev/null 2>&1; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            # The following step will destroy resources if the state file exists in S3.
            - name: Terraform destroy (this step will destroy resources if state exists)
              if: steps.check_s3.outputs.exists == 'true'
              run: |
                  aws s3 cp s3://${{ env.TerraformStateBucket }}/${{ github.repository_id }}/terraform.tfstate .
                  if terraform destroy -input=false -auto-approve; then
                    echo "Terraform destroy completed successfully."
                    aws s3 rm s3://${{ env.TerraformStateBucket }}/${{ github.repository_id }}/terraform.tfstate
                  else
                    echo "Error: Terraform destroy failed. Please check the logs for details."
                    exit 1
                  fi
